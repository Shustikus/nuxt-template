version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      nuxt:
        patterns:
          - "nuxt"
          - "@nuxt/*"
          - "@nuxtjs/*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      storybook:
        patterns:
          - "storybook"
          - "@storybook/*"
      playwright:
        patterns:
          - "playwright"
          - "@playwright/*"
