name: CI

on:
  push:
  pull_request:

jobs:
  unit_server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit + server tests (coverage gate)
        run: npm run test:ci

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  storybook:
    runs-on: ubuntu-latest
    needs: unit_server
    steps:
      - uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright browser
        run: npm run test:e2e:install

      - name: Storybook tests
        run: npm run test:storybook

      - name: Build Storybook
        run: npm run build-storybook

  e2e:
    runs-on: ubuntu-latest
    needs: [unit_server, secrets, storybook]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright browser
        run: npm run test:e2e:install

      - name: Start dev server
        run: npm run dev -- --host 127.0.0.1 --port 3000 &

      - name: Wait for server
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000/ > /dev/null; then
              echo "Server is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Server did not become ready"
          exit 1

      - name: E2E smoke
        env:
          NUXT_E2E_HOST: http://127.0.0.1:3000
        run: |
          npm run test:e2e
