services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "${PORT:-3000}:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-/api}
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  dev:
    profiles: [dev]
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "${PORT:-3000}:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-/api}
    env_file:
      - path: .env
        required: false
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.nuxt

  storybook:
    profiles: [storybook]
    build:
      context: .
      dockerfile: Dockerfile.storybook
      target: storybook
    ports:
      - "${STORYBOOK_PORT:-6006}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  storybook-dev:
    profiles: [storybook-dev]
    build:
      context: .
      dockerfile: Dockerfile.storybook
      target: development
    ports:
      - "${STORYBOOK_PORT:-6006}:6006"
    volumes:
      - .:/app
      - /app/node_modules
